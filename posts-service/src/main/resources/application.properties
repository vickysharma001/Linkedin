spring.application.name=posts-service

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/linkedin
spring.datasource.username=vickysharma
spring.datasource.password=

# HikariCP settings (connection pooling)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-1

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable Open-in-View warning
spring.jpa.open-in-view=false